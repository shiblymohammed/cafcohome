<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DravoHome{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333333;
            background-color: #f4f4f4;
        }
        
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
        }
        
        .email-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            text-align: center;
        }
        
        .email-header h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            margin: 0;
        }
        
        .email-header p {
            color: #ffffff;
            font-size: 14px;
            margin-top: 5px;
            opacity: 0.9;
        }
        
        .email-body {
            padding: 40px 30px;
        }
        
        .email-body h2 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        .email-body p {
            color: #666666;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .button {
            display: inline-block;
            padding: 14px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin: 20px 0;
            transition: transform 0.2s;
        }
        
        .button:hover {
            transform: translateY(-2px);
        }
        
        .info-box {
            background-color: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
        }
        
        .info-box strong {
            color: #333333;
            display: block;
            margin-bottom: 5px;
        }
        
        .order-items {
            margin: 20px 0;
        }
        
        .order-item {
            display: flex;
            padding: 15px;
            border-bottom: 1px solid #eeeeee;
            align-items: center;
        }
        
        .order-item:last-child {
            border-bottom: none;
        }
        
        .order-item-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 15px;
        }
        
        .order-item-details {
            flex: 1;
        }
        
        .order-item-name {
            font-weight: 600;
            color: #333333;
            margin-bottom: 5px;
        }
        
        .order-item-meta {
            font-size: 14px;
            color: #666666;
        }
        
        .order-item-price {
            font-weight: 600;
            color: #667eea;
            text-align: right;
        }
        
        .order-summary {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .order-summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 16px;
        }
        
        .order-summary-row.total {
            border-top: 2px solid #667eea;
            margin-top: 10px;
            padding-top: 15px;
            font-weight: 700;
            font-size: 18px;
            color: #667eea;
        }
        
        .email-footer {
            background-color: #f8f9fa;
            padding: 30px 20px;
            text-align: center;
            border-top: 1px solid #eeeeee;
        }
        
        .email-footer p {
            color: #999999;
            font-size: 14px;
            margin: 5px 0;
        }
        
        .social-links {
            margin: 20px 0;
        }
        
        .social-links a {
            display: inline-block;
            margin: 0 10px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .divider {
            height: 1px;
            background-color: #eeeeee;
            margin: 30px 0;
        }
        
        @media only screen and (max-width: 600px) {
            .email-body {
                padding: 20px 15px;
            }
            
            .order-item {
                flex-direction: column;
                text-align: center;
            }
            
            .order-item-image {
                margin: 0 0 10px 0;
            }
            
            .order-item-price {
                text-align: center;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="email-container">
        <!-- Header -->
        <div class="email-header">
            <h1>DravoHome</h1>
            <p>Premium Furniture for Your Dream Home</p>
        </div>
        
        <!-- Body -->
        <div class="email-body">
            {% block content %}{% endblock %}
        </div>
        
        <!-- Footer -->
        <div class="email-footer">
            <p><strong>DravoHome</strong></p>
            <p>Premium Furniture | Quality Craftsmanship | Timeless Design</p>
            
            <div class="social-links">
                <a href="#">Facebook</a> |
                <a href="#">Instagram</a> |
                <a href="#">Twitter</a>
            </div>
            
            <p style="margin-top: 20px;">
                Questions? Contact us at <a href="mailto:support@dravohome.com" style="color: #667eea;">support@dravohome.com</a>
            </p>
            
            <p style="margin-top: 15px; font-size: 12px;">
                © {% now "Y" %} DravoHome. All rights reserved.
            </p>
        </div>
    </div>
</body>
</html>
